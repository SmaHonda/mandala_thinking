<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>曼陀羅人生支點 · 輕盈重塑</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f1eb; /* 舒服輕盈的奶茶底色 */
  --card:#fff;
  --card-empty:#faf9f6;
  --border:#e4e0d5;
  --green:#5a7f6c; /* 溫柔舒緩的鼠尾草綠 */
  --green-mid:#739b86;
  --green-light:#edf2ef;
  --green-pale:#f5f7f6;
  --text:#3a3834; /* 降低對比度的深色 */
  --muted:#c2bdaf;
  --sub:#92af9f;
  --log-bg:#faf8f5;
  --warm:#a68060; /* 輕柔的大地暖棕 */
  --warm-light:#fbf9f5;
  --purple-light:#f7f4fa;
  --purple-border:#e5def0;
  --gold:#d49b2c; /* 溫和的柔金 */
  --fs:-apple-system,'Helvetica Neue',sans-serif;
  --ff:'Georgia','Noto Serif TC',serif;
}
html,body{
  background:var(--bg);font-family:var(--ff);min-height:100vh;overflow-x:hidden;color:var(--text);
  touch-action:manipulation; /* 優化手機點擊，防止雙擊放大 */
}

/* ── topbar ── */
#topbar{
  position:sticky;top:0;z-index:20;background:var(--bg);
  padding:12px 14px 10px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
#topbar h1{font-size:16px;font-weight:600;color:var(--green);letter-spacing:.5px}
.tabs{display:flex;gap:6px}
.tab{padding:6px 12px;font-size:12px;border-radius:20px;border:1px solid var(--green);background:transparent;color:var(--green);font-family:var(--fs);cursor:pointer;transition:all .2s}
.tab.on{background:var(--green);color:#fff}

/* ── daily card ── */
#daily{
  margin:10px 10px 0;
  background:var(--warm-light);
  border:1px solid #ebdccb;
  border-radius:12px;
  padding:14px 16px;
}
.daily-label{font-size:10px;color:var(--warm);letter-spacing:.8px;font-family:var(--fs);margin-bottom:6px;font-weight:500}
.daily-q{font-size:14px;color:var(--text);line-height:1.65;font-family:var(--ff)}
.daily-skip{display:block;margin-top:8px;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--fs);padding:0;text-decoration:underline;text-underline-offset:3px}

/* ── memory card ── */
#memory{
  margin:8px 10px 0;
  background:var(--purple-light);
  border:1px solid var(--purple-border);
  border-radius:12px;
  padding:14px 16px;
  display:none;
}
.mem-label{font-size:10px;color:#8a6fa6;letter-spacing:.8px;font-family:var(--fs);margin-bottom:6px;font-weight:500}
.mem-text{font-size:13px;color:var(--text);line-height:1.65;font-family:var(--ff);font-style:normal}
.mem-date{font-size:10px;color:#aa95c2;margin-top:5px;font-family:var(--fs)}
.mem-parent-zone{margin-top:10px;border-top:1px dashed #ded6eb;padding-top:10px}
.mem-parent-input{width:100%;padding:7px 10px;font-size:12px;border:1px solid #d4cae3;border-radius:6px;background:#fff;font-family:var(--fs)}
.mem-parent-btn{margin-top:6px;padding:5px 10px;font-size:11px;background:#8a6fa6;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:var(--fs)}

/* ── board ── */
#board-wrap{padding:10px;overflow:hidden;}
.board{
  display:grid;
  grid-template-columns:repeat(3,1fr) 5px repeat(3,1fr) 5px repeat(3,1fr);
  gap:4px;width:100%;
}
.cell{
  position:relative;
  aspect-ratio:1/1;
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:4px 2px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;overflow:hidden;
  transition:all .2s ease;
}
.cell:active{opacity:.7;transform:scale(0.98)}
.cell.empty{background:var(--card-empty);border-color:#eae6dc}
.cell.pivot{border:2px solid var(--green)}
.cell.theme{border:2px solid var(--green);background:var(--green-pale);cursor:default}
.cell.center{background:var(--green);border-color:var(--green);cursor:pointer}
.cell.gap{background:transparent;border:none;aspect-ratio:auto;padding:0;cursor:default;pointer-events:none}
.cell.has-recent{border-color:var(--green-mid);box-shadow:inset 0 0 4px rgba(90,127,108,0.05)}

/* cell name */
.cn{
  font-size:9.5px;font-weight:600;color:var(--text);
  line-height:1.25;word-break:break-all;
  font-family:var(--ff);
  overflow-wrap:break-word;
  max-width:92%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:1;
  margin-top:4px;
}
.cn.ph{color:var(--muted);font-weight:400;font-style:normal;font-size:8.5px}
.cn.wh{color:#fff;font-size:10px;line-height:1.4;font-style:normal;font-weight:600;margin-top:0}
.cn.gn{color:var(--green);font-size:9px;font-weight:500;margin-top:0}

/* 下方狀態文字統一縮小下沉 */
.cc{font-size:7.5px;color:var(--sub);font-family:var(--fs);margin-bottom:4px;line-height:1}
.cc.no{color:var(--muted)}

/* 馬斯洛小標記絕對定位，貼在右下角，不擠壓四字格子 */
.cm-badge{
  position:absolute;
  bottom:3px;
  right:3px;
  font-size:6.5px;
  color:var(--warm);
  background:rgba(255,244,232,0.85);
  padding:0px 2px;
  border-radius:2px;
  border:1px solid #ebdcc5;
  font-family:var(--fs);
  line-height:1;
  transform:scale(0.9);
}

/* ── stream view ── */
#stream-wrap{display:none;padding:10px 14px}
.stream-header{font-size:14px;color:var(--green);font-weight:600;margin-bottom:12px;font-family:var(--ff)}

/* ── activity strip ── */
#activity{
  margin:6px 10px 14px;
  padding:12px;
  background:rgba(255,255,255,.5);
  border-radius:10px;
  border:1px solid var(--border);
}
.act-label{font-size:10px;color:var(--muted);font-family:var(--fs);margin-bottom:8px;letter-spacing:.3px}
.act-dots{display:flex;flex-wrap:wrap;gap:4px}
.dot{width:10px;height:10px;border-radius:2px;background:var(--green-light);border:1px solid #d3e2db;flex-shrink:0}
.dot.fill{background:var(--green);border-color:var(--green)}
.dot.dim{background:#eae6dc;border-color:#e0dad0}

/* ── overlay / sheet ── */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50;align-items:flex-end;justify-content:center}
#ov.open{display:flex}
#sheet{
  background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;
  padding:16px 16px 44px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  box-shadow:0 -4px 20px rgba(0,0,0,0.05);
}
.handle{width:36px;height:4px;background:#e0dad0;border-radius:2px;margin:0 auto 14px}
.sh-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh-t{font-size:15px;font-weight:600;color:var(--text);font-family:var(--ff)}
.xbtn{background:none;border:none;font-size:24px;cursor:pointer;color:#ccc;line-height:1;padding:0 4px}
.fl{display:block;font-size:11px;color:#8a857c;margin-top:12px;margin-bottom:5px;font-family:var(--fs);letter-spacing:.3px;font-weight:500}

/* 智慧提醒橫幅 */
.smart-alert{background:#f6f8f6;border:1px solid #e1ebe6;padding:10px 12px;border-radius:8px;font-size:12px;color:var(--green);line-height:1.5;margin-bottom:12px;font-family:var(--fs)}
.smart-alert.heavy{background:#fff8f5;border-color:#fcece6;color:var(--warm)}

input[type=text],textarea{
  width:100%;padding:10px 12px;font-size:14px;
  border:1px solid #dedad0;border-radius:8px;
  font-family:var(--fs);color:var(--text);background:#fff;-webkit-appearance:none;
}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px var(--green-light)}
textarea{resize:none;line-height:1.55}

.btn-sn{width:100%;margin:8px 0 12px;padding:10px;background:var(--green-light);color:var(--green);border:1px solid #cce0d6;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--fs)}
.btn-add{width:100%;margin-top:14px;padding:12px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--fs);box-shadow:0 2px 6px rgba(90,127,108,0.2)}
.btn-add:active{opacity:.85}

/* mood controls */
.mood-row{display:flex;gap:6px;margin-bottom:4px}
.mood-btn{flex:1;padding:9px 4px;border-radius:8px;border:1px solid #e0dad0;background:#faf9f6;font-size:12px;color:#7a756c;cursor:pointer;font-family:var(--fs);transition:all .15s}
.mood-btn.sel{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:500}

/* maslow row */
.maslow-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.maslow-btn{padding:6px 10px;font-size:11px;border-radius:6px;border:1px solid #e0dad0;background:#fff;color:#666;cursor:pointer;font-family:var(--fs);transition:all .15s}
.maslow-btn.sel{border-color:var(--warm);background:var(--warm-light);color:var(--warm);font-weight:600;box-shadow:0 1px 3px rgba(166,128,96,0.1)}

.win-row{display:flex;align-items:center;margin:12px 0;background:var(--warm-light);padding:10px 12px;border-radius:8px;border:1px dashed #ebdccb;cursor:pointer}
.win-row input{margin-right:8px;transform:scale(1.1)}
.win-label{font-size:12px;color:var(--warm);font-family:var(--fs);font-weight:500}

/* logs */
.lw{margin-top:20px;border-top:1px solid #eae6dc;padding-top:14px}
.lhd{font-size:11px;color:#8a857c;margin-bottom:10px;font-family:var(--fs);font-weight:500}
.le{background:var(--log-bg);border-radius:8px;padding:11px 12px;margin-bottom:8px;border:1px solid #eae6dc}
.le.is-win{border-color:rgba(212,155,44,0.4);background:#fffefb}
.le-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.ld{font-size:10px;color:var(--green);font-weight:600;font-family:var(--fs)}
.ltags{display:flex;gap:4px;align-items:center}
.lmood{font-size:10px;color:var(--green);font-family:var(--fs);background:#fff;padding:1px 5px;border-radius:4px;border:1px solid #e1ebe6}
.lwin{font-size:10px;color:var(--gold);font-weight:600;border:1px solid #f5e4c4;background:#fffaf0;padding:1px 5px;border-radius:4px}
.lt-src{font-size:9px;color:var(--muted);background:#fff;padding:1px 4px;border-radius:3px;border:1px solid #e4e0d5;font-family:var(--fs)}
.lt{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-all;font-family:var(--fs)}
.lparent{margin-top:6px;padding-top:6px;border-top:1px dashed #eae5da;font-size:12px;color:#8a6fa6;font-style:normal;font-family:var(--fs)}
.lx{background:none;border:none;font-size:16px;cursor:pointer;color:#ccc;padding:0 2px}
.lx:active{color:#e24b4a}
.nolog{font-size:13px;color:var(--muted);font-style:normal;font-family:var(--fs)}
.theme-note{font-size:12px;color:var(--green);font-family:var(--fs);font-style:normal;padding:4px 0 8px;line-height:1.6}

/* 即時重養區塊 */
.immediate-parent-zone{background:var(--purple-light);border:1px solid var(--purple-border);border-radius:8px;padding:10px 12px;margin:10px 0}
.immediate-parent-title{font-size:11px;color:#8a6fa6;font-weight:600;font-family:var(--fs);margin-bottom:6px}
</style>
</head>
<body>

<div id="topbar">
  <h1>曼陀羅人生支點 · 輕盈重塑</h1>
  <div class="tabs">
    <button class="tab on" id="tab-outer" onclick="switchView('outer')">發散</button>
    <button class="tab"    id="tab-inner" onclick="switchView('inner')">聚焦</button>
    <button class="tab"    id="tab-stream" onclick="switchView('stream')">河流</button>
  </div>
</div>

<div id="daily">
  <div class="daily-label">TODAY &nbsp;·&nbsp; 今日一問</div>
  <div class="daily-q" id="daily-q">正在準備今天的問題…</div>
  <button class="daily-skip" onclick="nextQ()">換一個問題</button>
</div>

<div id="memory">
  <div class="mem-label">你曾經說過 &nbsp;·&nbsp; 值得被溫柔記住</div>
  <div class="mem-text" id="mem-text"></div>
  <div class="mem-date" id="mem-date"></div>
  <div class="mem-parent-zone">
    <input type="text" class="mem-parent-input" id="mem-parent-inp" placeholder="做自己的內在父母：對當時的自己說句溫柔的支持吧…">
    <button class="mem-parent-btn" onclick="saveParentResponse()">送出慈悲對話</button>
  </div>
</div>

<div id="board-wrap"><div class="board" id="board"></div></div>

<div id="stream-wrap">
  <div class="stream-header">時光河流（生命軌跡總覽）</div>
  <div id="stream-list"></div>
</div>

<div id="activity">
  <div class="act-label">你來過的日子</div>
  <div class="act-dots" id="act-dots"></div>
</div>

<div id="ov" onclick="ovClick(event)">
  <div id="sheet">
    <div class="handle"></div>
    <div class="sh-hd">
      <span class="sh-t" id="sh-t">格子</span>
      <button class="xbtn" onclick="closeSheet()">×</button>
    </div>
    <div id="sh-body"></div>
  </div>
</div>

<script>
/* ═══════════ STORE ═══════════ */
const STORE = 'mandala_v6_optimized';
const GAP = new Set([3,7]);

const DEF = [
  ['記帳','儲蓄','訂閱檢視','財富','經濟','緊急預備金','報稅','夢想基金','保險'],
  ['安靜時間','感恩','小組','讀經','信仰','禱告','服事','反省','盼望'],
  ['運動','睡眠','飲食','喝水','健康','伸展','體檢','牙齒','心理'],
  ['接案','AI 協作','學新工具','休息界線','工作事業','提案','作品集','客戶關係','報價'],
  ['老友','主動約','室友','教會朋友','人際','同行夥伴','久沒聯絡的','一對一','傾聽'],
  ['登山','閱讀','煮食','攝影','嗜好','手寫','植物','黑膠','小誌'],
  ['去冰島','養一隻狗','一間小屋','開一間店','夢想','學一種樂器','不為明天憂慮','寫一本書','慢活'],
  ['爸媽','預備自己','未來的家','手足','家庭伴侶','陪伴','表達愛','衝突修復','一起禱告'],
];
const DEF_INNER = DEF.map(sec => sec.map((n,ci) => ci===4 ? n : ''));

function mk(n){ return {name:n, logs:[], maslow:''} }

function defaultS(){
  return {
    outer: DEF.map(sec => sec.map(n => mk(n))),
    inner: DEF_INNER.map(sec => sec.map(n => mk(n))),
    center: mk('Get a Life'),
    activity: [],
    dailyIdx: 0,
    dailyDate: ''
  };
}

let S = (()=>{ try{ const r=localStorage.getItem(STORE); if(r)return JSON.parse(r); }catch(e){} return defaultS(); })();
let cur = null;
let view = 'outer';
let selectedMood = '普通';
let currentMemLogRef = null;
let currentDayMood = '普通';

function save(){ try{localStorage.setItem(STORE,JSON.stringify(S));}catch(e){} }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDate(iso){ const d=new Date(iso); return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function formatCellName(name){
  if(!name) return '';
  const cjk = (name.match(/[\u3000-\u9fff\uf900-\ufaff]/g)||[]).length;
  if(cjk === 4 && name.length === 4){ return name.slice(0,2) + '\n' + name.slice(2); }
  return name;
}

/* ═══════════ DAILY QUESTIONS ═══════════ */
const QUESTIONS_NORMAL = [
  '今天醒來，身體感覺怎麼樣？',
  '現在最佔據你心思的是什麼？',
  '最近有沒有哪一刻，讓你覺得「這樣就好」？',
  '你今天對自己做了什麼好的事？',
  '有沒有什麼事情，你一直想做但還沒開始？',
  '此刻最需要的，是休息還是前進？',
  '你現在信任自己嗎？哪個部分比較難？',
  '如果今天的你給三個月後的你句說話，會是什麼？',
  '有沒有什麼人讓你最近感到溫暖？',
  '你最近有沒有做到一件讓自己驕傲的小事？',
  '如果你的身體可以說話，它現在會說什麼？',
  '你現在最想被好好照顧的是哪個部分？',
  '今天結束之前，你想對自己說什麼？',
];

const QUESTIONS_HEAVY = [
  '現在感覺很沉，要不要先把手邊的事放一旁，去喝口水或閉眼五分鐘？',
  '感到沉重是很真實的信號，今天有沒有哪一個微小的地方可以允許自己「偷懶」一下？',
  '如果現在不需要扮演任何角色，你的身體最想做什麼？',
  '內在父母正在抱著你：這不是你的錯，今天我們只做最基本、最舒服的事就好，好嗎？',
  '此時此刻，有什麼小東西或小聲音能讓你稍微覺得安全、暖和一點點？',
];

function initDaily(){
  const today = todayStr();
  if(S.dailyDate !== today){
    S.dailyDate = today;
    S.dailyIdx = 0;
    save();
  }
  renderDailyQuestion();
}

function renderDailyQuestion(){
  const qEl = document.getElementById('daily-q');
  if(currentDayMood === '很沉') {
    const idx = S.dailyIdx % QUESTIONS_HEAVY.length;
    qEl.textContent = QUESTIONS_HEAVY[idx];
  } else {
    const idx = S.dailyIdx % QUESTIONS_NORMAL.length;
    qEl.textContent = QUESTIONS_NORMAL[idx];
  }
}

function nextQ(){
  S.dailyIdx++;
  save();
  renderDailyQuestion();
}

/* ═══════════ MEMORY ═══════════ */
function initMemory() {
  const all = [];
  S.outer.forEach(sec => sec.forEach(c => c.logs && c.logs.forEach(l => all.push(l))));
  S.inner.forEach(sec => sec.forEach(c => c.logs && c.logs.forEach(l => all.push(l))));
  if(all.length < 2) { document.getElementById('memory').style.display = 'none'; return; }
  const cutoff = Date.now() - 3*24*60*60*1000;
  const old = all.filter(l => new Date(l.date).getTime() < cutoff);
  if(!old.length) { document.getElementById('memory').style.display = 'none'; return; }
  
  const pick = old[Math.floor(Math.random() * old.length)];
  currentMemLogRef = pick;
  
  const moodString = pick.mood ? ` (${pick.mood})` : '';
  const preview = pick.text.length > 70 ? pick.text.slice(0,70)+'…' : pick.text;
  document.getElementById('mem-text').textContent = '「' + preview + '」' + moodString;
  document.getElementById('mem-date').textContent = fmtDate(pick.date) + ' 的你說的';
  document.getElementById('mem-parent-inp').value = pick.parentResponse || '';
  document.getElementById('memory').style.display = 'block';
}

function saveParentResponse(){
  if(!currentMemLogRef) return;
  currentMemLogRef.parentResponse = document.getElementById('mem-parent-inp').value.trim();
  save();
  alert('溫柔的話語已寫入記憶迴路');
  initMemory();
  if(cur && !cur.isTheme) {
    const data = cur.grid==='outer'?S.outer[cur.secIdx][cur.ci]:S.inner[cur.secIdx][cur.ci];
    renderLogs(data.logs || []);
  }
}

/* ═══════════ ACTIVITY ═══════════ */
function recordActivity(){
  const today = todayStr();
  if(!S.activity) S.activity = [];
  if(!S.activity.includes(today)){ S.activity.push(today); save(); }
}

function renderActivity(){
  recordActivity();
  const el = document.getElementById('act-dots');
  if(!el) return;
  el.innerHTML = '';
  const days = 60;
  const today = new Date();
  const set = new Set(S.activity || []);
  for(let i=days-1; i>=0; i--){
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const dot = document.createElement('div');
    dot.className = 'dot'+(set.has(key)?' fill':i<30?'':' dim');
    dot.title = key;
    el.appendChild(dot);
  }
}

/* ═══════════ BOARD ═══════════ */
const SEC_MAP = {'0,0':0,'0,1':1,'0,2':2,'1,0':3,'1,2':4,'2,0':5,'2,1':6,'2,2':7};
const CTR_TO_SEC = {0:0,1:1,2:2,3:3,5:4,6:5,7:6,8:7};

function pivotName(i){ return S.outer[i][4].name || DEF[i][4]; }

function buildBoard(){
  const board = document.getElementById('board');
  if(!board) return;
  board.innerHTML = '';
  for(let gr=0;gr<11;gr++){
    for(let gc=0;gc<11;gc++){
      board.appendChild(makeSlot(gr,gc));
    }
  }
}

function makeSlot(gr,gc){
  const div = document.createElement('div');
  if(GAP.has(gr)||GAP.has(gc)){ div.className='cell gap'; return div; }

  const sr=gr<3?0:gr<7?1:2, sc=gc<3?0:gc<7?1:2;
  const cr=gr<3?gr:gr<7?gr-4:gr-8, cc=gc<3?gc:gc<7?gc-4:gc-8;
  const ci=cr*3+cc;

  if(sr===1&&sc===1){
    if(ci===4){
      div.className='cell center';
      const n=document.createElement('div');
      n.className='cn wh';
      n.textContent = S.center.name || 'Get a Life';
      div.appendChild(n);
      div.onclick=()=>openThemeSheet('center');
    } else {
      const secIdx=CTR_TO_SEC[ci];
      div.className='cell theme';
      const n=document.createElement('div');
      n.className='cn gn';
      n.style.whiteSpace='pre-line';
      n.textContent=formatCellName(pivotName(secIdx));
      div.appendChild(n);
      div.onclick=()=>openThemeSheet('ring',secIdx);
    }
    return div;
  }

  const secIdx=SEC_MAP[sr+','+sc];
  const isTheme=(ci===4);
  const arr=view==='outer'?S.outer:S.inner;
  const data=arr[secIdx][ci];
  const hasLogs=data.logs&&data.logs.length>0;
  const recentCutoff=Date.now()-7*24*60*60*1000;
  const isRecent=hasLogs&&data.logs.some(l=>new Date(l.date).getTime()>recentCutoff);

  if(isTheme){
    div.className='cell theme';
    const n=document.createElement('div');
    n.className='cn gn';
    n.style.whiteSpace='pre-line';
    n.textContent=formatCellName(data.name||'主題');
    div.appendChild(n);
    div.onclick=()=>openThemeSheet(view==='outer'?'outer-pivot':'inner-pivot',secIdx);
  } else {
    div.className='cell'+(isRecent?' has-recent':(!hasLogs?' empty':''));
    addContent(div,data);
    div.onclick=()=>openLogSheet(view,secIdx,ci);
  }
  return div;
}

function addContent(div,data){
  const hasName=data.name&&data.name.trim();
  const hasLogs=data.logs&&data.logs.length>0;
  
  const n=document.createElement('div');
  n.className='cn'+(hasName?'':' ph');
  n.style.whiteSpace='pre-line';
  n.textContent=hasName?formatCellName(data.name):'待定義';
  div.appendChild(n);
  
  if(data.maslow) {
    const mb = document.createElement('div');
    mb.className = 'cm-badge';
    mb.textContent = data.maslow;
    div.appendChild(mb);
  }

  const c=document.createElement('div');
  const winCount = hasLogs ? data.logs.filter(l => l.isWin).length : 0;
  const winText = winCount > 0 ? `·重塑${winCount}` : '';
  
  if(!hasName) {
    c.className='cc no';
    c.textContent = '待定義';
  } else if(!hasLogs) {
    c.className='cc no';
    c.textContent = '待紀錄';
  } else {
    c.className='cc';
    c.textContent = data.logs.length+'則'+winText;
  }
  
  div.appendChild(c);
}

/* ═══════════ STREAM VIEW ═══════════ */
function renderStream() {
  const el = document.getElementById('stream-list');
  if(!el) return;
  
  let allLogs = [];
  const grab = (arr, typeLabel) => {
    arr.forEach((sec, sIdx) => {
      sec.forEach((cell, cIdx) => {
        if(cell.logs && cell.logs.length > 0) {
          cell.logs.forEach(l => {
            allLogs.push({
              ...l,
              sourceGrid: typeLabel,
              sourceCellName: cell.name || '未命名格子',
              maslow: cell.maslow || ''
            });
          });
        }
      });
    });
  };
  
  grab(S.outer, '發散');
  grab(S.inner, '聚焦');
  
  if(allLogs.length === 0) {
    el.innerHTML = '<div class="nolog">時光河流裡空空如也，去曼陀羅格子裡寫下第一筆重塑紀錄吧。</div>';
    return;
  }
  
  allLogs.sort((a,b) => new Date(b.date).getTime() - new Date(a.date).getTime());
  
  el.innerHTML = allLogs.map(l => {
    const moodTag = l.mood ? `<span class="lmood">${l.mood}</span>` : '';
    const winTag = l.isWin ? `<span class="lwin">微小勝利</span>` : '';
    const maslowTag = l.maslow ? `<span class="lmood" style="color:var(--warm); border-color:#ebdcc5; background:#fff4e8;">${l.maslow}</span>` : '';
    const parentBox = l.parentResponse ? `<div class="lparent">內在父母：「${escHtml(l.parentResponse)}」</div>` : '';
    
    return `<div class="le ${l.isWin?'is-win':''}">
      <div class="le-top">
        <span class="ld">${fmtDate(l.date)}</span>
        <div class="ltags">
          <span class="lt-src">${l.sourceGrid} · ${esc(l.sourceCellName)}</span>
          ${maslowTag}${winTag}${moodTag}
        </div>
      </div>
      <div class="lt">${escHtml(l.text)}</div>
      ${parentBox}
    </div>`;
  }).join('');
}

/* ═══════════ SHEETS ═══════════ */
function openThemeSheet(kind,secIdx){
  cur={isTheme:true,kind,secIdx};
  let name='',label='';
  if(kind==='center'){ name=S.center.name; label='核心名稱'; }
  else { name=pivotName(secIdx); label='主題名稱（連動所有關聯格）'; }
  document.getElementById('sh-t').textContent=name||'主題';
  document.getElementById('sh-body').innerHTML=`
    <p class="theme-note">此格為核心主題方向，連動所有關聯格子，不單獨紀錄內容。</p>
    <label class="fl">${label}</label>
    <input type="text" id="n-inp" maxlength="12" placeholder="輸入名稱…" value="${esc(name)}">
    <button class="btn-sn" onclick="saveThemeName()">儲存名稱</button>
  `;
  document.getElementById('ov').classList.add('open');
}

function saveThemeName(){
  if(!cur||!cur.isTheme) return;
  const val=document.getElementById('n-inp').value.trim();
  if(cur.kind==='center'){ S.center.name=val; }
  else { S.outer[cur.secIdx][4].name=val; S.inner[cur.secIdx][4].name=val; }
  save(); buildBoard();
  document.getElementById('sh-t').textContent=val||'主題';
}

const MASLOW_MAP = {
  'L1': 'L1 生理需求 (睡眠/飲食/喝水/健康)',
  'L2': 'L2 安全需求 (預備金/保險/界線/沉澱)',
  'L3': 'L3 愛與歸屬 (人際/老友/家庭/伴侶)',
  'L4': 'L4 尊嚴需求 (工作/股票/作品集/成就感)',
  'L5': 'L5 自我實現 (學習/夢想/滑雪/慢活)'
};

function openLogSheet(grid,secIdx,ci){
  cur={isTheme:false,grid,secIdx,ci};
  selectedMood=currentDayMood;
  const data=grid==='outer'?S.outer[secIdx][ci]:S.inner[secIdx][ci];
  document.getElementById('sh-t').textContent=data.name||'待定義格子';
  
  let maslowButtons = Object.keys(MASLOW_MAP).map(k => {
    const sel = data.maslow === k ? 'sel' : '';
    return `<button class="maslow-btn ${sel}" onclick="saveGridMaslow(this, '${k}')">${k}</button>`;
  }).join('');

  let smartAlertHtml = '';
  if(data.maslow) {
    if(currentDayMood === '很沉' && (data.maslow === 'L4' || data.maslow === 'L5')) {
      smartAlertHtml = `<div class="smart-alert heavy">💡 <b>智慧重塑提醒：</b>目前你感覺「很沉」，而這格屬於高層次需求 (${data.maslow})。請溫柔對待，此時不強求前進，寫下當下的抗拒或放空也是很棒的紀錄。</div>`;
    } else if(currentDayMood === '還不錯' || currentDayMood === '輕一點') {
      smartAlertHtml = `<div class="smart-alert">💡 <b>智慧重塑提醒：</b>現在能量狀態「${currentDayMood}」，很適合為這個 <b>${data.maslow}</b> 主題注入一些主動的探索或小前進喔！</div>`;
    } else {
      smartAlertHtml = `<div class="smart-alert">💡 <b>智慧重塑提醒：</b>這格屬於底層核心支點 (${data.maslow})。重養自己的關鍵是先把這裡填穩。不論感覺如何，好好記錄它的狀態。</div>`;
    }
  } else {
    smartAlertHtml = `<div class="smart-alert">💡 <b>小提示：</b>可以在下方為這個格子設定「馬斯洛層次」，未來點開時將會獲得個人化的次序提醒。</div>`;
  }

  document.getElementById('sh-body').innerHTML=`
    <div id="smart-alert-container">${smartAlertHtml}</div>

    <label class="fl">格子主題名稱</label>
    <input type="text" id="n-inp" maxlength="14" placeholder="輸入名稱…" value="${esc(data.name||'')}">
    <button class="btn-sn" onclick="saveLogName()">儲存名稱</button>
    
    <label class="fl">定義此格的人生需求層次 (整個主題屬性)</label>
    <div class="maslow-row">${maslowButtons}</div>
    <div style="font-size:10px; color:var(--warm); margin-bottom:12px; font-family:var(--fs);" id="maslow-desc">
      ${data.maslow ? MASLOW_MAP[data.maslow] : '尚未設定層次'}
    </div>

    <label class="fl">現在身體感覺如何？</label>
    <div class="mood-row">
      <button class="mood-btn ${selectedMood==='很沉'?'sel':''}" onclick="updateDialogMood(this,'很沉')">很沉</button>
      <button class="mood-btn ${selectedMood==='普通'?'sel':''}" onclick="updateDialogMood(this,'普通')">普通</button>
      <button class="mood-btn ${selectedMood==='輕一點'?'sel':''}" onclick="updateDialogMood(this,'輕一點')">輕一點</button>
      <button class="mood-btn ${selectedMood==='還不錯'?'sel':''}" onclick="updateDialogMood(this,'還不錯')">還不錯</button>
    </div>

    <label class="fl">寫下當下的真實紀錄</label>
    <textarea id="t-inp" rows="4" placeholder="不需要完整，只需要真實。寫下想法、阻礙、或是此刻的現狀…"></textarea>
    
    <div id="immediate-parent-container" style="display: ${selectedMood==='很沉'?'block':'none'};">
      <div class="immediate-parent-zone">
        <div class="immediate-parent-title">🛡️ 內在父母的即時抱抱</div>
        <input type="text" id="immediate-parent-inp" placeholder="看著此時感到很沉的自己，溫柔地對他說句支持吧（非必填）…">
      </div>
    </div>

    <div class="win-row" onclick="toggleWinCheckbox()">
      <input type="checkbox" id="win-cb" onclick="event.stopPropagation()">
      <span class="win-label">[ 慈悲自我 ] 這是一件讓我感到放鬆、被照顧或驕傲的微小勝利</span>
    </div>

    <button class="btn-add" onclick="addLog()">新增紀錄</button>
    
    <div class="lw">
      <div class="lhd">過去紀錄</div>
      <div id="log-list"></div>
    </div>
  `;
  renderLogs(data.logs||[]);
  document.getElementById('ov').classList.add('open');
  setTimeout(()=>document.getElementById('t-inp').focus(),250);
}

function saveGridMaslow(btn, lv) {
  if(!cur||cur.isTheme) return;
  const data=cur.grid==='outer'?S.outer[cur.secIdx][cur.ci]:S.inner[cur.secIdx][cur.ci];
  
  if(data.maslow === lv) {
    data.maslow = '';
    btn.classList.remove('sel');
  } else {
    data.maslow = lv;
    document.querySelectorAll('.maslow-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
  }
  
  document.getElementById('maslow-desc').textContent = data.maslow ? MASLOW_MAP[data.maslow] : '尚未設定層次';
  save(); buildBoard();
  updateSmartAlert(data.maslow);
}

function updateDialogMood(btn, mood) {
  currentDayMood = mood;
  selectedMood = mood;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  
  const ipContainer = document.getElementById('immediate-parent-container');
  if(ipContainer) {
    ipContainer.style.display = mood === '很沉' ? 'block' : 'none';
  }
  
  renderDailyQuestion();
  
  if(!cur||cur.isTheme) return;
  const data=cur.grid==='outer'?S.outer[cur.secIdx][cur.ci]:S.inner[cur.secIdx][cur.ci];
  updateSmartAlert(data.maslow);
}

function updateSmartAlert(maslow) {
  const container = document.getElementById('smart-alert-container');
  if(!container) return;
  if(maslow) {
    if(currentDayMood === '很沉' && (maslow === 'L4' || maslow === 'L5')) {
      container.innerHTML = `<div class="smart-alert heavy">💡 <b>智慧重塑提醒：</b>目前你感覺「很沉」，而這格屬於高層次需求 (${maslow})。請溫柔對待，此時不強求前進，寫下當下的抗拒或放空也是很棒的紀錄。</div>`;
    } else if(currentDayMood === '還不錯' || currentDayMood === '輕一點') {
      container.innerHTML = `<div class="smart-alert">💡 <b>智慧重塑提醒：</b>現在能量狀態「${currentDayMood}」，很適合為這個 <b>${maslow}</b> 主題注入一些主動的探索或小前進喔！</div>`;
    } else {
      container.innerHTML = `<div class="smart-alert">💡 <b>智慧重塑提醒：</b>這格屬於底層核心支點 (${maslow})。重養自己的關鍵是先把這裡填穩。不論感覺如何，好好記錄它的狀態。</div>`;
    }
  } else {
    container.innerHTML = `<div class="smart-alert">💡 <b>小提示：</b>可以在下方為這個格子設定「馬斯洛層次」，未來點開時將會獲得個人化的次序提醒。</div>`;
  }
}

function toggleWinCheckbox(){
  const cb = document.getElementById('win-cb');
  if(cb) cb.checked = !cb.checked;
}

function saveLogName(){
  if(!cur||cur.isTheme) return;
  const data=cur.grid==='outer'?S.outer[cur.secIdx][cur.ci]:S.inner[cur.secIdx][cur.ci];
  data.name=document.getElementById('n-inp').value.trim();
  save(); buildBoard();
  document.getElementById('sh-t').textContent=data.name||'格子';
}

function addLog(){
  if(!cur||cur.isTheme) return;
  const data=cur.grid==='outer'?S.outer[cur.secIdx][cur.ci]:S.inner[cur.secIdx][cur.ci];
  const text=document.getElementById('t-inp').value.trim();
  if(!text) return;
  if(!data.logs) data.logs=[];
  
  const isWin = document.getElementById('win-cb').checked;
  
  let parentText = '';
  const ipInp = document.getElementById('immediate-parent-inp');
  if(ipInp && selectedMood === '很沉') {
    parentText = ipInp.value.trim();
  }

  data.logs.push({
    date:new Date().toISOString(),
    text,
    mood:selectedMood,
    isWin:isWin,
    parentResponse:parentText
  });
  
  recordActivity();
  save(); buildBoard();
  
  document.getElementById('t-inp').value='';
  document.getElementById('win-cb').checked = false;
  if(ipInp) ipInp.value = '';
  
  renderLogs(data.logs);
  renderActivity();
  initMemory();
}

function renderLogs(logs){
  const el=document.getElementById('log-list');
  if(!el) return;
  if(!logs||!logs.length){ el.innerHTML='<div class="nolog">還沒有紀錄，寫下第一筆吧</div>'; return; }
  el.innerHTML=[...logs].reverse().map((l,ri)=>{
    const realIdx=logs.length-1-ri;
    const moodTag=l.mood?`<span class="lmood">${l.mood}</span>`:'';
    const winTag=l.isWin?`<span class="lwin">微小勝利</span>`:'';
    const parentBox=l.parentResponse?`<div class="lparent">內在父母：「${escHtml(l.parentResponse)}」</div>` : '';
    
    return `<div class="le ${l.isWin?'is-win':''}">
      <div class="le-top">
        <span class="ld">${fmtDate(l.date)}</span>
        <div class="ltags">${winTag}${moodTag}</div>
        <button class="lx" onclick="delLog(${realIdx})">×</button>
      </div>
      <div class="lt">${escHtml(l.text)}</div>
      ${parentBox}
    </div>`;
  }).join('');
}

function delLog(idx){
  if(!cur||cur.isTheme) return;
  const data=cur.grid==='outer'?S.outer[cur.secIdx][cur.ci]:S.inner[cur.secIdx][cur.ci];
  if(!confirm('確定刪除這筆紀錄？')) return;
  data.logs.splice(idx,1);
  save(); buildBoard(); renderLogs(data.logs);
  initMemory();
}

function closeSheet(){ document.getElementById('ov').classList.remove('open'); cur=null; }
function ovClick(e){ if(e.target===document.getElementById('ov'))closeSheet(); }

function switchView(v){
  view=v;
  document.getElementById('tab-outer').classList.toggle('on', v === 'outer');
  document.getElementById('tab-inner').classList.toggle('on', v === 'inner');
  document.getElementById('tab-stream').classList.toggle('on', v === 'stream');

  const bWrap = document.getElementById('board-wrap');
  const sWrap = document.getElementById('stream-wrap');

  if(v === 'stream') {
    bWrap.style.display = 'none';
    sWrap.style.display = 'block';
    renderStream();
  } else {
    bWrap.style.display = 'block';
    sWrap.style.display = 'none';
    buildBoard();
  }
}

/* ═══════════ SERVICE WORKER ═══════════ */
// 徹底移除 Blob 網域隔離，強制解註冊舊有的 Service Worker 讓 LocalStorage 回歸正常
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(registrations) {
    for(let registration of registrations) {
      registration.unregister();
    }
  });
}

/* ═══════════ INIT ═══════════ */
initDaily();
initMemory();
buildBoard();
renderActivity();
</script>
